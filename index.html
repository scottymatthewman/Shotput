<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dance — UI prototype</title>
    <link
      rel="preload"
      href="/fonts/gen-interface-jp/GenInterfaceJP-Regular.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <style>
      /* Boot skeleton — sync font with src/styles/typography.css */
      @font-face {
        font-family: 'Gen Interface JP';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('/fonts/gen-interface-jp/GenInterfaceJP-Regular.ttf') format('truetype');
      }
      :root {
        --boot-bg: #fafaf9;
        --boot-surface-1: #ffffff;
        --boot-border: #e7e5e4;
        --boot-text: #1c1917;
        --boot-font-family: 'Gen Interface JP', ui-sans-serif, system-ui, sans-serif;
        --sidebar-width: 244px;
      }
      html.dark {
        --boot-bg: #0c0a09;
        --boot-surface-1: #1c1917;
        --boot-border: #44403c;
        --boot-text: #f5f5f4;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: var(--boot-bg);
        color: var(--boot-text);
        font-family: var(--boot-font-family);
      }
      #root,
      #root * {
        font-family: inherit;
      }
      #root {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
        overflow: hidden;
        overscroll-behavior: none;
      }
      .dance-boot {
        display: flex;
        min-height: 100dvh;
        gap: 12px;
        padding: 0;
        box-sizing: border-box;
      }
      .dance-boot-sidebar {
        display: none;
        width: var(--sidebar-width);
        flex-shrink: 0;
        border-right: 1px solid var(--boot-border);
        padding: 12px;
      }
      .dance-boot-main {
        flex: 1;
        min-width: 0;
        padding: 12px 12px 12px 0;
      }
      .dance-boot-panel {
        height: calc(100dvh - 24px);
        border: 1px solid var(--boot-border);
        border-radius: 12px;
        background: var(--boot-surface-1);
      }
      html[data-sidebar-collapsed='1'] {
        --sidebar-width: 56px;
      }
      @media (min-width: 768px) {
        .dance-boot-sidebar {
          display: block;
        }
      }
    </style>
    <script>
      performance.mark('appStart')
      try {
        var ui = localStorage.getItem('dance-ui-v2') || localStorage.getItem('dance-ui-v1')
        if (ui) {
          var parsed = JSON.parse(ui)
          var state = parsed && parsed.state
          if (state && state.sidebarCollapsed) {
            document.documentElement.dataset.sidebarCollapsed = '1'
          }
          if (state && state.theme === 'dark') {
            document.documentElement.classList.add('dark')
          }
        }
        if (localStorage.getItem('dance-prototype-v1') || localStorage.getItem('dance-ui-v1') || localStorage.getItem('dance-ui-v2')) {
          document.documentElement.dataset.hasPersistedData = '1'
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root">
      <div class="dance-boot" aria-hidden="true">
        <div class="dance-boot-sidebar"></div>
        <div class="dance-boot-main">
          <div class="dance-boot-panel"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
